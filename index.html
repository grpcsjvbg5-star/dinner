<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晩御飯ルーレット</title>

<style>
/* ===== 画面全体 ===== */
body {
  font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
  padding: 10px;
  background: linear-gradient(#fceabb, #f8b500);
  text-align: center;
  font-size: 20px; /* 全体的に少し調整 */
}

h2 { font-size: 32px; color: #5d4037; }

/* ===== ボタン ===== */
button {
  width: 95%;
  max-width: 550px;
  padding: 20px;
  margin: 10px 0;
  font-size: 24px;
  font-weight: bold;
  color: white;
  border: none;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff6a88, #ff99ac);
  box-shadow: 0 6px 0 #cc4b66;
  cursor: pointer;
  transition: 0.1s;
}

button:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #cc4b66;
}

/* ===== 入力欄 ===== */
input {
  width: 80%;
  max-width: 400px;
  padding: 12px;
  font-size: 18px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* ===== 結果表示 ===== */
.day {
  margin: 20px auto;
  padding: 20px;
  max-width: 600px;
  background: white;
  border-radius: 20px;
  font-size: 28px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== ルーレット ===== */
#roulette {
  margin: 20px auto;
  width: 150px;
  height: 150px;
  display: none;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(
    #ff6a88 0deg 90deg,
    #ffcc70 90deg 180deg,
    #6a89ff 180deg 270deg,
    #6affc1 270deg 360deg
  );
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== テーブル ===== */
table {
  width: 100%;
  max-width: 800px;
  margin: 20px auto;
  border-collapse: collapse;
  font-size: 18px;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 12px 8px;
}

th { background: #ffcc70; }

.delete {
  display: inline-block;
  margin-top: 5px;
  color: #ff4444;
  cursor: pointer;
  font-size: 14px;
  text-decoration: underline;
}
</style>
</head>

<body>

<h2>🍽 晩御飯ルーレット</h2>

<button onclick="startRoulette('normal')">🎯 晩ごはんルーレット</button>
<button onclick="startRoulette('easy')">⚡ 手の込んだメニューも</button>

<div id="roulette">
  <div class="wheel" id="wheelInner"></div>
</div>

<div id="result"></div>

<hr>

<h3>メニュー追加</h3>

<div>
  <input id="mainInput" placeholder="主菜">
  <button style="width:auto; padding:10px 20px; font-size:16px;" onclick="addItem('main')">主菜追加</button>
</div>
<div>
  <input id="hardInput" placeholder="特に手の込んだ主菜">
  <button style="width:auto; padding:10px 20px; font-size:16px;" onclick="addItem('hard')">追加</button>
</div>
<div>
  <input id="sideInput" placeholder="副菜">
  <button style="width:auto; padding:10px 20px; font-size:16px;" onclick="addItem('side')">追加</button>
</div>
<div>
  <input id="soupInput" placeholder="味噌汁">
  <button style="width:auto; padding:10px 20px; font-size:16px;" onclick="addItem('soup')">追加</button>
</div>

<hr>

<h3>メニュー一覧</h3>

<button style="width:auto; padding:10px; font-size:16px; background:#4CAF50; box-shadow: 0 4px 0 #2e7d32;" onclick="backupData()">💾 バックアップ保存</button>
<br><br>
<input type="file" id="fileInput" onchange="restoreData(event)" style="font-size: 14px;">

<table>
<tr>
<th>主菜</th>
<th>手の込んだ主菜</th>
<th>副菜</th>
<th>味噌汁</th>
</tr>
<tr>
<td id="mainList"></td>
<td id="hardList"></td>
<td id="sideList"></td>
<td id="soupList"></td>
</tr>
</table>

<script>
// ===== データ管理 =====
let mainDishes = JSON.parse(localStorage.getItem("mainDishes")) || ["唐揚げ","餃子","回鍋肉","手羽先揚げ","焼き魚"];
let hardDishes = JSON.parse(localStorage.getItem("hardDishes")) || ["ハンバーグ","カレー","グラタン"];
let sideDishes = JSON.parse(localStorage.getItem("sideDishes")) || ["サラダ","冷奴"];
let soups = JSON.parse(localStorage.getItem("soups")) || ["味噌汁"];

const resultDiv = document.getElementById("result");
const rouletteDiv = document.getElementById("roulette");
const wheelInner = document.getElementById("wheelInner");

function saveData(){
  localStorage.setItem("mainDishes", JSON.stringify(mainDishes));
  localStorage.setItem("hardDishes", JSON.stringify(hardDishes));
  localStorage.setItem("sideDishes", JSON.stringify(sideDishes));
  localStorage.setItem("soups", JSON.stringify(soups));
}

// ===== 項目追加 =====
function addItem(type){
  let input, array;
  if(type==="main"){ input=document.getElementById("mainInput"); array=mainDishes; }
  if(type==="hard"){ input=document.getElementById("hardInput"); array=hardDishes; }
  if(type==="side"){ input=document.getElementById("sideInput"); array=sideDishes; }
  if(type==="soup"){ input=document.getElementById("soupInput"); array=soups; }

  if(!input.value.trim()) return;

  array.push(input.value.trim());
  input.value = "";
  saveData();
  renderList();
}

// ===== 項目削除 =====
function deleteItem(type, index){
  if(type==="main") mainDishes.splice(index,1);
  if(type==="hard") hardDishes.splice(index,1);
  if(type==="side") sideDishes.splice(index,1);
  if(type==="soup") soups.splice(index,1);

  saveData();
  renderList();
}

// ===== リスト描画 =====
function renderList(){
  function makeHtml(arr, type){
    return arr.map((item, index) => {
      // クォーテーション競合を避けるためテンプレートリテラルを使用
      return `${item}<br><span class="delete" onclick="deleteItem('${type}', ${index})">削除</span><br><br>`;
    }).join("");
  }

  document.getElementById("mainList").innerHTML = makeHtml(mainDishes,"main");
  document.getElementById("hardList").innerHTML = makeHtml(hardDishes,"hard");
  document.getElementById("sideList").innerHTML = makeHtml(sideDishes,"side");
  document.getElementById("soupList").innerHTML = makeHtml(soups,"soup");
}

// ===== ルーレット処理 =====
function startRoulette(mode){
  resultDiv.innerHTML = "";
  rouletteDiv.style.display = "block";
  wheelInner.style.animation = "spin 0.2s linear infinite";

  setTimeout(() => {
    wheelInner.style.animation = "none";
    rouletteDiv.style.display = "none";
    generateMenu(mode);
  }, 1500);
}

function getRandom(arr){
  return arr.length > 0 ? arr[Math.floor(Math.random() * arr.length)] : "（なし）";
}

function shuffle(array){
  return [...array].sort(() => Math.random() - 0.5);
}

// ===== メニュー生成 =====
function generateMenu(mode){
  let selectedMains = [];
  
  if(mode === "normal"){
    selectedMains = shuffle(mainDishes).slice(0, 5);
  } else {
    let hard = shuffle(hardDishes).slice(0, 2);
    let main = shuffle(mainDishes).slice(0, 3);
    selectedMains = shuffle([...hard, ...main]);
  }

  let html = "";
  selectedMains.forEach((dish, i) => {
    html += `
      <div class="day">
        <div style="font-size:16px; color:#888;">Day ${i+1}</div>
        🍖 ${dish}<br>
        🥗 ${getRandom(sideDishes)}<br>
        🍲 ${getRandom(soups)}
      </div>`;
  });
  resultDiv.innerHTML = html;
}

// ===== バックアップ & 復元 =====
function backupData(){
  const data = { mainDishes, hardDishes, sideDishes, soups };
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `menu_backup_${new Date().toLocaleDateString()}.json`;
  a.click();
}

function restoreData(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result);
      mainDishes = data.mainDishes || [];
      hardDishes = data.hardDishes || [];
      sideDishes = data.sideDishes || [];
      soups = data.soups || [];
      saveData();
      renderList();
      alert("データを復元しました！");
    } catch(err) {
      alert("ファイルの読み込みに失敗しました。");
    }
  };
  reader.readAsText(file);
}

// 初期実行
renderList();
</script>

</body>
</html>
