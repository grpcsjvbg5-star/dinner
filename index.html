<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>晩御飯ルーレット iPhone版</title>

<style>
/* 全体デザイン */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  padding: 10px;
  background: linear-gradient(#fceabb, #f8b500);
  text-align: center;
  color: #333;
  margin: 0;
  -webkit-tap-highlight-color: transparent;
}

h2 { font-size: 24px; color: #5d4037; margin: 15px 0; }

/* ボタン */
button {
  width: 90%;
  max-width: 400px;
  padding: 16px;
  margin: 8px 0;
  font-size: 18px;
  font-weight: bold;
  color: white;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #ff6a88, #ff99ac);
  box-shadow: 0 4px 0 #cc4b66;
  cursor: pointer;
}

button:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #cc4b66;
}

/* 入力エリア */
.input-section {
  background: rgba(255, 255, 255, 0.8);
  margin: 10px auto;
  padding: 12px;
  border-radius: 12px;
  max-width: 450px;
}

input {
  width: 65%;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  -webkit-appearance: none;
}

.add-btn {
  width: auto;
  padding: 10px 15px;
  font-size: 14px;
  background: #5d4037;
  box-shadow: 0 3px 0 #3e2723;
  display: inline-block;
  vertical-align: middle;
}

/* 結果表示 */
.day-card {
  margin: 10px auto;
  padding: 15px;
  max-width: 450px;
  background: white;
  border-radius: 15px;
  font-size: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* 一覧テーブル */
table {
  width: 100%;
  margin: 20px 0;
  border-collapse: collapse;
  background: white;
  font-size: 13px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px 4px;
  vertical-align: top;
}

th { background: #ffcc70; }

.del-text {
  color: #ff4444;
  font-size: 11px;
  text-decoration: underline;
  display: block;
  margin-top: 5px;
}
</style>
</head>

<body>

<h2>🍽 晩御飯ルーレット</h2>

<button id="btn-normal">🎯 5日分決める</button>
<button id="btn-hard" style="background:#ffcc70; color:#5d4037; box-shadow: 0 4px 0 #e6b866;">⚡ 手間料理を含める</button>

<div id="result-display"></div>

<hr>

<h3>メニュー追加</h3>
<div class="input-section">
  <input type="text" id="in-main" placeholder="主菜">
  <button class="add-btn" id="add-main">追加</button>
</div>
<div class="input-section">
  <input type="text" id="in-hard" placeholder="手間主菜">
  <button class="add-btn" id="add-hard">追加</button>
</div>
<div class="input-section">
  <input type="text" id="in-side" placeholder="副菜">
  <button class="add-btn" id="add-side">追加</button>
</div>
<div class="input-section">
  <input type="text" id="in-soup" placeholder="汁物">
  <button class="add-btn" id="add-soup">追加</button>
</div>

<hr>

<h3>一覧 / バックアップ</h3>
<button id="btn-copy" style="background:#4CAF50; box-shadow:0 3px 0 #2e7d32; font-size:14px; width:auto; padding:10px;">📋 データをコピー</button>

<table>
  <tr><th>主菜</th><th>手間</th><th>副菜</th><th>汁物</th></tr>
  <tr>
    <td id="list-main"></td>
    <td id="list-hard"></td>
    <td id="list-side"></td>
    <td id="list-soup"></td>
  </tr>
</table>

<script>
// --- データ管理 ---
let menu = {
  main: JSON.parse(localStorage.getItem("menu_main")) || ["唐揚げ","餃子"],
  hard: JSON.parse(localStorage.getItem("menu_hard")) || ["カレー","バーグ"],
  side: JSON.parse(localStorage.getItem("menu_side")) || ["サラダ","冷奴"],
  soup: JSON.parse(localStorage.getItem("menu_soup")) || ["味噌汁"]
};

// --- UI更新 ---
function updateUI() {
  const cats = ['main', 'hard', 'side', 'soup'];
  cats.forEach(c => {
    const td = document.getElementById(`list-${c}`);
    td.innerHTML = "";
    menu[c].forEach((item, i) => {
      const div = document.createElement("div");
      div.innerHTML = `${item}<span class="del-text" onclick="doRemove('${c}',${i})">削除</span><br>`;
      td.appendChild(div);
    });
    localStorage.setItem(`menu_${c}`, JSON.stringify(menu[c]));
  });
}

// --- 追加処理 ---
function doAdd(c) {
  const input = document.getElementById(`in-${c}`);
  const val = input.value.trim();
  if(!val) return;
  menu[c].push(val);
  input.value = "";
  updateUI();
}

// --- 削除処理 ---
window.doRemove = function(c, i) {
  if(confirm("削除しますか？")) {
    menu[c].splice(i, 1);
    updateUI();
  }
};

// --- ルーレット ---
function doRoulette(mode) {
  const disp = document.getElementById("result-display");
  disp.innerHTML = "ルーレット中...";
  
  setTimeout(() => {
    let pool = (mode === 'hard') ? [...menu.main, ...menu.hard] : [...menu.main];
    if(pool.length === 0) { alert("メニューを登録してください"); return; }
    
    let selected = pool.sort(() => 0.5 - Math.random()).slice(0, 5);
    disp.innerHTML = selected.map((d, i) => `
      <div class="day-card">
        Day ${i+1}: <b>${d}</b><br>
        <span style="font-size:14px;">🥗 ${menu.side[Math.floor(Math.random()*menu.side.length)] || "-"} / 🍲 ${menu.soup[Math.floor(Math.random()*menu.soup.length)] || "-"}</span>
      </div>
    `).join("");
  }, 500);
}

// --- iPhone用コピー機能 ---
function copyData() {
  const text = JSON.stringify(menu);
  navigator.clipboard.writeText(text).then(() => {
    alert("データをコピーしました！メモ帳などに貼り付けて保存してください。");
  }).catch(() => {
    alert("コピーに失敗しました。");
  });
}

// --- イベント登録（iPhoneで確実に動かすため） ---
document.getElementById("add-main").addEventListener("click", () => doAdd('main'));
document.getElementById("add-hard").addEventListener("click", () => doAdd('hard'));
document.getElementById("add-side").addEventListener("click", () => doAdd('side'));
document.getElementById("add-soup").addEventListener("click", () => doAdd('soup'));
document.getElementById("btn-normal").addEventListener("click", () => doRoulette('normal'));
document.getElementById("btn-hard").addEventListener("click", () => doRoulette('hard'));
document.getElementById("btn-copy").addEventListener("click", copyData);

// 初期起動
updateUI();
</script>

</body>
</html>
