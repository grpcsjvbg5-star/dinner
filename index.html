<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>晩御飯ルーレット</title>

<style>
/* ===== 画面全体 ===== */
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 10px;
  background: linear-gradient(#fceabb, #f8b500);
  text-align: center;
  font-size: 28px;
}

h2 { font-size: 40px; }

/* ===== ボタン ===== */
button {
  width: 95%;
  max-width: 550px;
  padding: 30px;
  margin: 15px 0;
  font-size: 32px;
  font-weight: bold;
  color: white;
  border: none;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff6a88, #ff99ac);
  box-shadow: 0 8px 0 #cc4b66;
}

button:active {
  transform: translateY(5px);
  box-shadow: 0 3px 0 #cc4b66;
}

/* ===== 入力欄 ===== */
input {
  width: 85%;
  padding: 12px;
  font-size: 24px;
  margin: 10px;
  border-radius: 10px;
}

/* ===== 結果表示 ===== */
.day {
  margin: 20px auto;
  padding: 20px;
  max-width: 800px;
  background: white;
  border-radius: 20px;
  font-size: 50px;
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(0.7); }
  100% { transform: scale(1); }
}

/* ===== ルーレット ===== */
#roulette {
  margin: 20px auto;
  width: 200px;
  height: 200px;
  display: none;
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(
    #ff6a88 0deg 90deg,
    #ffcc70 90deg 180deg,
    #6a89ff 180deg 270deg,
    #6affc1 270deg 360deg
  );
}

/* ===== テーブル ===== */
table {
  width: 100%;
  max-width: 800px;
  margin: auto;
  border-collapse: collapse;
  font-size: 26px;
}

th, td {
  border: 2px solid #333;
  padding: 8px;
}

th { background: #ffcc70; }

.delete {
  color: red;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🍽 晩御飯ルーレット</h2>

<button onclick="startRoulette('normal')">🎯 晩ごはんルーレット</button>
<button onclick="startRoulette('easy')">⚡ 手の込んだメニューも</button>

<div id="roulette">
  <div class="wheel"></div>
</div>

<div id="result"></div>

<hr>

<h3>メニュー追加</h3>

<input id="mainInput" placeholder="主菜">
<button onclick="addItem('main')">主菜</button>

<input id="hardInput" placeholder="特に手の込んだ主菜">
<button onclick="addItem('hard')">追加</button>

<input id="sideInput" placeholder="副菜">
<button onclick="addItem('side')">追加</button>

<input id="soupInput" placeholder="味噌汁">
<button onclick="addItem('soup')">追加</button>

<hr>

<h3>メニュー一覧</h3>

<table>
<tr>
<th>主菜</th>
<th>特に手の込んだ主菜</th>
<th>副菜</th>
<th>味噌汁</th>
</tr>
<tr>
<td id="mainList"></td>
<td id="hardList"></td>
<td id="sideList"></td>
<td id="soupList"></td>
</tr>
</table>

<script>

// ===== データ =====
let mainDishes = JSON.parse(localStorage.getItem("mainDishes")) || ["唐揚げ","餃子","回鍋肉","手羽先揚げ","焼き魚"];
let hardDishes = JSON.parse(localStorage.getItem("hardDishes")) || ["ハンバーグ","カレー","グラタン"];
let sideDishes = JSON.parse(localStorage.getItem("sideDishes")) || ["サラダ","冷奴"];
let soups = JSON.parse(localStorage.getItem("soups")) || ["味噌汁"];

// ===== 保存 =====
function saveData(){
  localStorage.setItem("mainDishes", JSON.stringify(mainDishes));
  localStorage.setItem("hardDishes", JSON.stringify(hardDishes));
  localStorage.setItem("sideDishes", JSON.stringify(sideDishes));
  localStorage.setItem("soups", JSON.stringify(soups));
}

// ===== 追加 =====
function addItem(type){
  let input, array;

  if(type==="main"){input=mainInput; array=mainDishes;}
  if(type==="hard"){input=hardInput; array=hardDishes;}
  if(type==="side"){input=sideInput; array=sideDishes;}
  if(type==="soup"){input=soupInput; array=soups;}

  if(input.value.trim()==="") return;

  array.push(input.value);
  input.value="";

  saveData();
  renderList();
}

// ===== 削除 =====
function deleteItem(type,index){
  if(type==="main") mainDishes.splice(index,1);
  if(type==="hard") hardDishes.splice(index,1);
  if(type==="side") sideDishes.splice(index,1);
  if(type==="soup") soups.splice(index,1);

  saveData();
  renderList();
}

// ===== 表示 =====
function renderList(){

  function make(arr,type){
    let html="";
    for(let i=0;i<arr.length;i++){
      html += arr[i] +
        "<br><span class='delete' onclick="deleteItem('" + type + "'," + i + ")">削除</span><br>";
    }
    return html;
  }

  mainList.innerHTML = make(mainDishes,"main");
  hardList.innerHTML = make(hardDishes,"hard");
  sideList.innerHTML = make(sideDishes,"side");
  soupList.innerHTML = make(soups,"soup");
}

// ===== ルーレット =====
function startRoulette(mode){

  result.innerHTML="";
  roulette.style.display="block";

  let wheel=document.querySelector(".wheel");
  wheel.style.animation="spin 0.3s linear infinite";

  setTimeout(()=>{
    wheel.style.animation="none";
    roulette.style.display="none";
    generateMenu(mode);
  },2000);
}

// ===== 回転 =====
let style = document.createElement('style');
style.innerHTML = "@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}";
document.head.appendChild(style);

// ===== ランダム =====
function getRandom(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

// ===== シャッフル =====
function shuffle(array){
  return [...array].sort(() => 0.5 - Math.random());
}

// ===== メニュー生成 =====
function generateMenu(mode){

  result.innerHTML = "";
  let selectedMains = [];

  if(mode==="normal"){
    selectedMains = shuffle(mainDishes).slice(0,5);
  } else {
    let hard = shuffle(hardDishes).slice(0,2);
    let main = shuffle(mainDishes).slice(0,3);
    selectedMains = shuffle([...hard, ...main]);
  }

  for(let i=0;i<selectedMains.length;i++){
    result.innerHTML +=
      "<div class='day'>" +
      "✨ "+(i+1)+"日目<br>" +
      "🍖 "+selectedMains[i]+"<br>" +
      "🥗 "+getRandom(sideDishes)+"<br>" +
      "🍲 "+getRandom(soups) +
      "</div>";
  }
}

// 初期表示
renderList();

</script>

</body>
</html>
