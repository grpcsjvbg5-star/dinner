<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晩御飯ルーレット 完全版</title>

<style>
/* ===== デザイン設定 ===== */
body {
  font-family: sans-serif;
  padding: 10px;
  background: linear-gradient(#fceabb, #f8b500);
  text-align: center;
  color: #333;
}

h2 { font-size: 28px; color: #5d4037; }

/* ボタンのデザイン */
button {
  width: 90%;
  max-width: 400px;
  padding: 15px;
  margin: 10px 0;
  font-size: 20px;
  font-weight: bold;
  color: white;
  border: none;
  border-radius: 15px;
  background: linear-gradient(135deg, #ff6a88, #ff99ac);
  box-shadow: 0 5px 0 #cc4b66;
  cursor: pointer;
}

button:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 #cc4b66;
}

/* 入力エリア */
.input-section {
  background: rgba(255, 255, 255, 0.7);
  margin: 10px auto;
  padding: 15px;
  border-radius: 15px;
  max-width: 500px;
}

input {
  width: 60%;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.small-btn {
  width: auto;
  padding: 10px 15px;
  font-size: 14px;
  margin-left: 5px;
}

/* 結果表示 */
.day-card {
  margin: 15px auto;
  padding: 15px;
  max-width: 500px;
  background: white;
  border-radius: 15px;
  font-size: 22px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ルーレットの見た目 */
#roulette-box {
  margin: 20px auto;
  width: 80px;
  height: 80px;
  display: none;
}

.wheel-graphic {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(#ff6a88, #ffcc70, #6a89ff, #6affc1);
  animation: spin 0.2s linear infinite;
}

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* テーブル一覧 */
table {
  width: 100%;
  max-width: 800px;
  margin: 20px auto;
  border-collapse: collapse;
  background: white;
  font-size: 14px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  vertical-align: top;
  text-align: center;
}

th { background: #ffcc70; }

.delete-link {
  color: #ff4444;
  cursor: pointer;
  font-size: 11px;
  text-decoration: underline;
  display: block;
  margin-top: 5px;
}
</style>
</head>

<body>

<h2>🍽 晩御飯ルーレット</h2>

<button onclick="startRoulette('normal')">🎯 5日分決める</button>
<button onclick="startRoulette('easy')">⚡ 手間料理を含めて決める</button>

<div id="roulette-box"><div class="wheel-graphic"></div></div>
<div id="result-display"></div>

<hr>

<h3>メニューを追加する</h3>
<div class="input-section">
  <input type="text" id="addMain" placeholder="主菜（唐揚げなど）">
  <button class="small-btn" onclick="handleAddItem('main')">追加</button>
</div>
<div class="input-section">
  <input type="text" id="addHard" placeholder="手間料理（カレーなど）">
  <button class="small-btn" onclick="handleAddItem('hard')">追加</button>
</div>
<div class="input-section">
  <input type="text" id="addSide" placeholder="副菜（サラダなど）">
  <button class="small-btn" onclick="handleAddItem('side')">追加</button>
</div>
<div class="input-section">
  <input type="text" id="addSoup" placeholder="汁物（味噌汁など）">
  <button class="small-btn" onclick="handleAddItem('soup')">追加</button>
</div>

<hr>

<h3>登録済みメニュー</h3>
<button class="small-btn" style="background:#4CAF50;" onclick="downloadBackup()">💾 バックアップを保存</button>

<table>
  <tr>
    <th>主菜</th>
    <th>手間主菜</th>
    <th>副菜</th>
    <th>汁物</th>
  </tr>
  <tr>
    <td id="list-main"></td>
    <td id="list-hard"></td>
    <td id="list-side"></td>
    <td id="list-soup"></td>
  </tr>
</table>

<script>
// --- 1. データ管理 ---
let data = {
  main: JSON.parse(localStorage.getItem("mains")) || ["唐揚げ","餃子","焼き魚"],
  hard: JSON.parse(localStorage.getItem("hards")) || ["カレー","ハンバーグ"],
  side: JSON.parse(localStorage.getItem("sides")) || ["サラダ","冷奴"],
  soup: JSON.parse(localStorage.getItem("soups")) || ["味噌汁"]
};

// --- 2. 画面への反映機能 ---
function refreshUI() {
  const types = ['main', 'hard', 'side', 'soup'];
  
  types.forEach(type => {
    const td = document.getElementById(`list-${type}`);
    td.innerHTML = ""; // 一旦空にする
    
    data[type].forEach((name, index) => {
      const itemDiv = document.createElement("div");
      itemDiv.style.marginBottom = "10px";
      itemDiv.innerHTML = `${name} <span class="delete-link" onclick="handleRemoveItem('${type}', ${index})">削除</span>`;
      td.appendChild(itemDiv);
    });
    
    // 保存
    localStorage.setItem(`${type}s`, JSON.stringify(data[type]));
  });
}

// --- 3. 追加アクション ---
function handleAddItem(type) {
  // 入力欄のIDを特定
  const inputId = "add" + type.charAt(0).toUpperCase() + type.slice(1);
  const inputEl = document.getElementById(inputId);
  const val = inputEl.value.trim();

  if (!val) {
    alert("文字を入力してください");
    return;
  }

  data[type].push(val); // 配列に追加
  inputEl.value = "";   // 入力欄をクリア
  refreshUI();          // 画面更新
}

// --- 4. 削除アクション ---
function handleRemoveItem(type, index) {
  if (confirm("本当に削除しますか？")) {
    data[type].splice(index, 1);
    refreshUI();
  }
}

// --- 5. ルーレット実行 ---
function startRoulette(mode) {
  const resultArea = document.getElementById("result-display");
  const rBox = document.getElementById("roulette-box");
  
  resultArea.innerHTML = "";
  rBox.style.display = "block";

  setTimeout(() => {
    rBox.style.display = "none";
    
    // メニューの選定
    let pool = [];
    if (mode === 'normal') {
      pool = [...data.main];
    } else {
      pool = [...data.main, ...data.hard];
    }

    if (pool.length === 0) {
      alert("メニューを登録してください");
      return;
    }

    // 5日分シャッフル
    let selectedMains = [...pool].sort(() => 0.5 - Math.random()).slice(0, 5);

    resultArea.innerHTML = selectedMains.map((dish, i) => `
      <div class="day-card">
        <div style="font-size:14px; color:#999;">${i+1}日目</div>
        🍖 ${dish}<br>
        🥗 ${data.side[Math.floor(Math.random()*data.side.length)] || "なし"}<br>
        🍲 ${data.soup[Math.floor(Math.random()*data.soup.length)] || "なし"}
      </div>
    `).join("");
  }, 1000);
}

// --- 6. バックアップ ---
function downloadBackup() {
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "my_menu.json";
  a.click();
}

// 起動時に表示
refreshUI();
</script>

</body>
</html>
